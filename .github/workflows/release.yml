name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  check-version:
    name: Verify tag matches Cargo.toml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check version consistency
        run: |
          CARGO_VERSION="$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch: Cargo.toml has ${CARGO_VERSION} but tag is ${TAG_VERSION}"
            exit 1
          fi
          echo "Version ${CARGO_VERSION} matches tag ${GITHUB_REF_NAME}"

  build:
    name: Build ${{ matrix.target }}
    needs: check-version
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64-gnu)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install musl tools (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install musl cross-compilation tools (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        env:
          MUSL_CROSS_URL: "https://musl.cc/aarch64-linux-musl-cross.tgz"
          MUSL_CROSS_SHA256: "c909817856d6ceda86aa510894fa3527eac7989f0ef6e87b5721c58737a06c38"
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu musl-tools
          # Install aarch64 musl cross toolchain (checksum-verified)
          curl -fsSL "$MUSL_CROSS_URL" -o /tmp/musl-cross.tgz
          echo "${MUSL_CROSS_SHA256}  /tmp/musl-cross.tgz" | sha256sum -c -
          sudo tar xz -C /opt < /tmp/musl-cross.tgz
          rm /tmp/musl-cross.tgz
          echo "/opt/aarch64-linux-musl-cross/bin" >> $GITHUB_PATH
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-musl-gcc" >> $GITHUB_ENV

      - name: Run tests
        if: "!contains(matrix.target, 'aarch64-unknown-linux')"
        run: cargo test --release --target ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary
        if: "!contains(matrix.target, 'aarch64-unknown-linux')"
        run: strip target/${{ matrix.target }}/release/desktest

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../desktest-${{ github.ref_name }}-${{ matrix.target }}.tar.gz desktest
          cd ../../..
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum desktest-${{ github.ref_name }}-${{ matrix.target }}.tar.gz >> checksums.txt
          else
            shasum -a 256 desktest-${{ github.ref_name }}-${{ matrix.target }}.tar.gz >> checksums.txt
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktest-${{ matrix.target }}
          path: desktest-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

      - name: Upload checksum
        uses: actions/upload-artifact@v4
        with:
          name: checksum-${{ matrix.target }}
          path: checksums.txt

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Merge checksums
        run: cat checksum-*/checksums.txt > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            desktest-*/desktest-*.tar.gz
            SHA256SUMS.txt
