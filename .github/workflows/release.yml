name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Run tests
        if: "!contains(matrix.target, 'aarch64-unknown-linux') && !(contains(matrix.target, 'x86_64') && runner.arch == 'ARM64') && !(contains(matrix.target, 'aarch64-apple-darwin') && runner.arch != 'ARM64')"
        run: cargo test --release --target ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary
        if: "!contains(matrix.target, 'aarch64-unknown-linux')"
        run: strip target/${{ matrix.target }}/release/eyetest

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../eyetest-${{ github.ref_name }}-${{ matrix.target }}.tar.gz eyetest
          cd ../../..
          if command -v sha256sum &>/dev/null; then
            sha256sum eyetest-${{ github.ref_name }}-${{ matrix.target }}.tar.gz >> checksums.txt
          else
            shasum -a 256 eyetest-${{ github.ref_name }}-${{ matrix.target }}.tar.gz >> checksums.txt
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eyetest-${{ matrix.target }}
          path: eyetest-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

      - name: Upload checksum
        uses: actions/upload-artifact@v4
        with:
          name: checksum-${{ matrix.target }}
          path: checksums.txt

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Merge checksums
        run: cat checksum-*/checksums.txt > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            eyetest-*/eyetest-*.tar.gz
            SHA256SUMS.txt
