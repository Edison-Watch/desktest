<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>desktest - Trajectory Review</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e1e4e8; display: flex; height: 100vh; }
.sidebar { width: 350px; background: #161b22; border-right: 1px solid #30363d; overflow-y: auto; flex-shrink: 0; display: flex; flex-direction: column; }
.sidebar-header { padding: 16px; font-size: 14px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 8px; }
.step-item { padding: 12px 16px; border-bottom: 1px solid #21262d; cursor: pointer; transition: background 0.15s; }
.step-item:hover { background: #1c2128; }
.step-item.active { background: #1f6feb22; border-left: 3px solid #1f6feb; }
.step-num { font-weight: 600; font-size: 13px; color: #58a6ff; }
.step-thought { font-size: 12px; color: #8b949e; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; margin-left: 8px; }
.badge.success { background: #23882344; color: #3fb950; }
.badge.done { background: #1f6feb22; color: #58a6ff; }
.badge.error { background: #f8514944; color: #f85149; }
.badge.fail { background: #f8514944; color: #f85149; }
.badge.pass { background: #23882344; color: #3fb950; }
.badge.action-python { background: #1f6feb22; color: #79c0ff; }
.badge.action-bash { background: #d2a8ff22; color: #d2a8ff; }
.badge.action-both { background: #f0883e22; color: #f0883e; }
.main { flex: 1; overflow-y: auto; padding: 24px; }
.detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.detail-header h2 { font-size: 20px; }
.screenshot { max-width: 100%; border-radius: 8px; border: 1px solid #30363d; margin-bottom: 20px; }
.section { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
.section h3 { font-size: 13px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
.section pre { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; white-space: pre-wrap; word-break: break-all; color: #c9d1d9; }
.thought-text { font-size: 14px; line-height: 1.6; color: #c9d1d9; }
.codify-bar { padding: 12px 16px; border-top: 1px solid #30363d; background: #161b22; margin-top: auto; }
.codify-bar label { font-size: 12px; color: #8b949e; cursor: pointer; }
.codify-bar input[type=checkbox] { margin-right: 6px; }
.codify-btn { display: block; width: 100%; margin-top: 12px; padding: 8px; background: #238636; color: white; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 600; }
.codify-btn:hover { background: #2ea043; }
.empty { display: flex; align-items: center; justify-content: center; height: 100%; color: #484f58; font-size: 16px; }
.recording-item { padding: 12px 16px; border-bottom: 1px solid #21262d; cursor: pointer; transition: background 0.15s; font-weight: 600; font-size: 13px; color: #d2a8ff; display: flex; align-items: center; gap: 8px; }
.recording-item:hover { background: #1c2128; }
.recording-item.active { background: #1f6feb22; border-left: 3px solid #1f6feb; }
.recording-item svg { width: 16px; height: 16px; fill: currentColor; }
.video-container { max-width: 100%; }
.video-container video { width: 100%; border-radius: 8px; border: 1px solid #30363d; }
/* Live mode styles */
.live-indicator { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: #3fb950; }
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: #3fb950; animation: pulse 1.5s ease-in-out infinite; }
.live-dot.disconnected { background: #f85149; animation: none; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.live-header { padding: 12px 16px; border-bottom: 1px solid #30363d; background: #161b22; }
.live-header .test-info { font-size: 13px; color: #c9d1d9; margin-top: 4px; }
.live-header .vnc-link { font-size: 12px; color: #58a6ff; text-decoration: none; }
.live-header .vnc-link:hover { text-decoration: underline; }
.progress-bar { height: 4px; background: #21262d; border-radius: 2px; margin-top: 8px; overflow: hidden; }
.progress-bar .fill { height: 100%; background: #58a6ff; transition: width 0.3s; }
.final-status { padding: 12px 16px; border-bottom: 1px solid #30363d; background: #161b22; text-align: center; }
.final-status .badge { font-size: 14px; padding: 4px 16px; }
.task-item { padding: 12px 16px; border-bottom: 1px solid #21262d; cursor: pointer; transition: background 0.15s; font-weight: 600; font-size: 13px; color: #f0883e; display: flex; align-items: center; gap: 8px; }
.task-item:hover { background: #1c2128; }
.task-item.active { background: #1f6feb22; border-left: 3px solid #1f6feb; }
.task-item svg { width: 16px; height: 16px; fill: currentColor; }
.task-instruction { font-size: 14px; line-height: 1.6; color: #c9d1d9; padding: 16px; background: #1c2128; border-radius: 6px; }
.task-meta { display: grid; grid-template-columns: auto 1fr; gap: 8px 16px; font-size: 13px; }
.task-meta dt { color: #8b949e; font-weight: 600; }
.task-meta dd { color: #c9d1d9; }
.collapsible { cursor: pointer; user-select: none; display: flex; align-items: center; gap: 6px; }
.collapsible:hover { color: #c9d1d9; }
.collapsible .arrow { font-size: 10px; transition: transform 0.15s; display: inline-block; }
.collapsible.open .arrow { transform: rotate(90deg); }
.collapse-content { margin-top: 12px; }
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-header">
    <span>Steps</span>
    <span id="live-indicator"></span>
  </div>
  <div id="live-header"></div>
  <div id="task-entry"></div>
  <div id="recording-entry"></div>
  <div id="step-list"></div>
  <div id="codify-bar" class="codify-bar">
    <div id="checkbox-list"></div>
    <button class="codify-btn" onclick="copyCodifyCommand()">Copy codify command</button>
  </div>
</div>
<div class="main" id="main-panel">
  <div class="empty">Select a step to view details</div>
</div>

<script>
var STEPS = /*__STEPS__*/[];
var MODE = /*__MODE__*/"static";
var VNC_URL = /*__VNC_URL__*/"";
var HAS_RECORDING = /*__HAS_RECORDING__*/false;
var RECORDING_URI = /*__RECORDING_URI__*/"";
var TRAJECTORY_PATH = /*__TRAJECTORY_PATH__*/"";
var TASK_JSON = /*__TASK_JSON__*/null;

var taskEntry = document.getElementById('task-entry');
var stepList = document.getElementById('step-list');
var checkboxList = document.getElementById('checkbox-list');
var mainPanel = document.getElementById('main-panel');
var recordingEntry = document.getElementById('recording-entry');
var liveIndicator = document.getElementById('live-indicator');
var liveHeader = document.getElementById('live-header');
var codifyBar = document.getElementById('codify-bar');

// --- Task entry (static mode) ---
if (TASK_JSON) {
  var taskDiv = document.createElement('div');
  taskDiv.className = 'task-item';
  taskDiv.id = 'task-nav';
  taskDiv.innerHTML = '<svg viewBox="0 0 16 16"><path d="M0 1.75A.75.75 0 0 1 .75 1h4.253c1.227 0 2.317.59 3 1.501A3.743 3.743 0 0 1 11.006 1h4.245a.75.75 0 0 1 .75.75v10.5a.75.75 0 0 1-.75.75h-4.507a2.25 2.25 0 0 0-1.591.659l-.622.621a.75.75 0 0 1-1.06 0l-.622-.621A2.25 2.25 0 0 0 5.258 13H.75a.75.75 0 0 1-.75-.75Zm7.251 10.324.004-5.073-.002-2.253A2.25 2.25 0 0 0 5.003 2.5H1.5v9h3.757a3.75 3.75 0 0 1 1.994.574ZM8.755 4.75l-.004 7.322a3.752 3.752 0 0 1 1.992-.572H14.5v-9h-3.495a2.25 2.25 0 0 0-2.25 2.25Z"/></svg> Task';
  taskDiv.addEventListener('click', function() { showTask(); });
  taskEntry.appendChild(taskDiv);
}

function showTask() {
  document.querySelectorAll('.step-item').forEach(function(el) { el.classList.remove('active'); });
  var recNav = document.getElementById('recording-nav');
  if (recNav) recNav.classList.remove('active');
  var nav = document.getElementById('task-nav');
  if (nav) nav.classList.add('active');

  var t = TASK_JSON;
  var html = '<div class="detail-header"><h2>Task: ' + escapeHtml(t.id || 'Unknown') + '</h2></div>';

  // Instruction (collapsible)
  html += '<div class="section"><h3 class="collapsible open" onclick="toggleCollapse(this)"><span class="arrow">&#9654;</span> Instruction</h3><div class="collapse-content"><div class="task-instruction">' + escapeHtml(t.instruction || '') + '</div></div></div>';

  // Completion Condition (collapsible, shown only if present)
  if (t.completion_condition) {
    html += '<div class="section"><h3 class="collapsible open" onclick="toggleCollapse(this)"><span class="arrow">&#9654;</span> Completion Condition</h3><div class="collapse-content"><div class="task-instruction">' + escapeHtml(t.completion_condition) + '</div></div></div>';
  }

  // Metadata summary
  html += '<div class="section"><h3>Details</h3><dl class="task-meta">';
  html += '<dt>Timeout</dt><dd>' + (t.timeout != null ? t.timeout : 300) + 's</dd>';
  html += '<dt>Max Steps</dt><dd>' + (t.max_steps != null ? t.max_steps : 15) + '</dd>';
  if (t.app) {
    var appType = t.app.type || 'unknown';
    html += '<dt>App Type</dt><dd>' + escapeHtml(appType) + '</dd>';
  }
  if (t.config && t.config.length > 0) {
    html += '<dt>Setup Steps</dt><dd>' + t.config.length + '</dd>';
  }
  if (t.evaluator) {
    var evalType = t.evaluator.mode || 'unknown';
    html += '<dt>Evaluator</dt><dd>' + escapeHtml(evalType) + '</dd>';
  }
  html += '</dl></div>';

  // Full JSON
  html += '<div class="section"><h3>Full Task Definition</h3>';
  html += '<pre>' + escapeHtml(JSON.stringify(t, null, 2)) + '</pre>';
  html += '</div>';

  mainPanel.innerHTML = html;
}

// --- Recording entry (static mode) ---
if (HAS_RECORDING) {
  var div = document.createElement('div');
  div.className = 'recording-item';
  div.id = 'recording-nav';
  div.innerHTML = '<svg viewBox="0 0 16 16"><path d="M1 4.804a1 1 0 0 1 1.53-.848l2.972 1.86A1 1 0 0 1 6 6.68v2.64a1 1 0 0 1-.498.864l-2.972 1.86A1 1 0 0 1 1 11.196V4.804zM7.5 4A1.5 1.5 0 0 1 9 5.5v5A1.5 1.5 0 0 1 7.5 12H14.5A1.5 1.5 0 0 0 16 10.5v-5A1.5 1.5 0 0 0 14.5 4H7.5z"/></svg> Recording';
  div.addEventListener('click', function() { showRecording(); });
  recordingEntry.appendChild(div);
}

// --- Helper functions ---
function badgeClass(result) {
  if (!result) return 'fail';
  if (result === 'success') return 'success';
  if (result === 'evaluation_passed') return 'done';
  if (result === 'done') return 'done';
  if (result.startsWith('error') || result === 'fail' || result === 'evaluation_error') return 'error';
  if (result === 'evaluation_failed') return 'fail';
  return 'fail';
}

var VALID_ACTION_TYPES = {'python': true, 'bash': true, 'python + bash': true, 'python+bash': true};

function getActionType(step) {
  // Prefer explicit action_type field (set by backend); fall back to
  // heuristic for old trajectory files that lack the field.
  if (step.action_type) {
    // Normalize "python+bash" to display form
    if (step.action_type === 'python+bash') return 'python + bash';
    // Allowlist to prevent XSS via crafted trajectory files
    if (VALID_ACTION_TYPES[step.action_type]) return step.action_type;
    return null;
  }
  // Heuristic fallback: check for "# [bash]" marker in action_code
  var code = step.action_code;
  if (!code) return null;
  var hasBash = /(^|\n)# \[bash\](\n|$)/.test(code);
  var stripped = code.replace(/(^|\n\n)# \[bash\]\n[^\0]*?(?=\n\n|$)/g, '');
  var hasPython = stripped.trim().length > 0;
  if (hasBash && hasPython) return 'python + bash';
  if (hasBash) return 'bash';
  if (hasPython) return 'python';
  return null;
}

function escapeHtml(text) {
  var div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function toggleCollapse(el) {
  el.classList.toggle('open');
  var content = el.nextElementSibling;
  if (content) content.style.display = content.style.display === 'none' ? '' : 'none';
}

function showRecording() {
  document.querySelectorAll('.step-item').forEach(function(el) { el.classList.remove('active'); });
  var taskNav = document.getElementById('task-nav');
  if (taskNav) taskNav.classList.remove('active');
  var nav = document.getElementById('recording-nav');
  if (nav) nav.classList.add('active');
  mainPanel.innerHTML = '<div class="detail-header"><h2>Session Recording</h2></div><div class="video-container"><video controls autoplay muted><source src="' + RECORDING_URI + '" type="video/mp4">Your browser does not support video playback.</video></div>';
}

function selectStep(index) {
  document.querySelectorAll('.step-item').forEach(function(el) { el.classList.remove('active'); });
  var nav = document.getElementById('recording-nav');
  if (nav) nav.classList.remove('active');
  var taskNav = document.getElementById('task-nav');
  if (taskNav) taskNav.classList.remove('active');
  var el = document.querySelector('.step-item[data-index="' + index + '"]');
  if (el) el.classList.add('active');

  var s = STEPS[index];
  var html = '';
  var detailActionType = getActionType(s);
  var detailActionBadge = '';
  if (detailActionType) {
    var detailActionCls = {'python': 'action-python', 'bash': 'action-bash', 'python + bash': 'action-both'}[detailActionType] || 'action-python';
    detailActionBadge = '<span class="badge ' + detailActionCls + '">' + escapeHtml(detailActionType) + '</span>';
  }
  html += '<div class="detail-header"><h2>Step ' + s.step + '</h2><span class="badge ' + badgeClass(s.result) + '">' + escapeHtml(s.result) + '</span>' + detailActionBadge + '<span style="color:#484f58;font-size:13px">' + escapeHtml(s.timestamp || '') + '</span></div>';

  if (s.screenshot) {
    html += '<img class="screenshot" src="data:image/png;base64,' + s.screenshot + '" alt="Step ' + s.step + ' screenshot">';
  }

  if (s.thought) {
    html += '<div class="section"><h3>Thought</h3><div class="thought-text">' + escapeHtml(s.thought) + '</div></div>';
  }

  if (s.action_code) {
    html += '<div class="section"><h3>Action Code</h3><pre>' + escapeHtml(s.action_code) + '</pre></div>';
  }

  if (s.bash_output) {
    html += '<div class="section"><h3 class="collapsible" onclick="toggleCollapse(this)"><span class="arrow">&#9654;</span> Bash Output</h3><pre class="collapse-content" style="display:none">' + escapeHtml(s.bash_output) + '</pre></div>';
  }

  if (s.error_feedback) {
    // Only show Error Details if it adds info beyond the result badge (which already shows "error:<feedback>")
    var resultError = (s.result && s.result.startsWith('error:')) ? s.result.substring(6) : '';
    if (s.error_feedback !== resultError) {
      html += '<div class="section"><h3 class="collapsible" onclick="toggleCollapse(this)"><span class="arrow">&#9654;</span> Error Details</h3><pre class="collapse-content" style="display:none">' + escapeHtml(s.error_feedback) + '</pre></div>';
    }
  }

  mainPanel.innerHTML = html;
}

function addStepToSidebar(s, index) {
  var div = document.createElement('div');
  div.className = 'step-item';
  div.dataset.index = index;
  var actionType = getActionType(s);
  var actionBadge = '';
  if (actionType) {
    var actionCls = {'python': 'action-python', 'bash': 'action-bash', 'python + bash': 'action-both'}[actionType] || 'action-python';
    actionBadge = '<span class="badge ' + actionCls + '">' + escapeHtml(actionType) + '</span>';
  }
  div.innerHTML = '<span class="step-num">Step ' + s.step + '</span><span class="badge ' + badgeClass(s.result) + '">' + escapeHtml(s.result) + '</span>' + actionBadge + '<div class="step-thought">' + escapeHtml(s.thought || '(no thought)') + '</div>';
  div.addEventListener('click', function() { selectStep(index); });
  stepList.appendChild(div);
}

function addCheckbox(s) {
  var label = document.createElement('label');
  label.style.display = 'block';
  label.style.marginBottom = '4px';
  label.innerHTML = '<input type="checkbox" value="' + s.step + '" ' + (s.result === 'success' ? 'checked' : '') + '> Step ' + s.step;
  checkboxList.appendChild(label);
}

function copyCodifyCommand() {
  var checked = Array.from(document.querySelectorAll('#checkbox-list input:checked')).map(function(cb) { return cb.value; });
  if (checked.length === 0) {
    alert('Select at least one step to include.');
    return;
  }
  var quotedPath = "'" + TRAJECTORY_PATH.replace(/'/g, "'\\''") + "'";
  var cmd = 'desktest codify ' + quotedPath + ' --steps ' + checked.join(',');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(cmd).then(function() {
      var btn = document.querySelector('.codify-btn');
      btn.textContent = 'Copied!';
      setTimeout(function() { btn.textContent = 'Copy codify command'; }, 2000);
    }).catch(function() {
      prompt('Copy this command:', cmd);
    });
  } else {
    prompt('Copy this command:', cmd);
  }
}

// --- Render initial steps (static mode) ---
STEPS.forEach(function(s, i) {
  addStepToSidebar(s, i);
  addCheckbox(s);
});

if (STEPS.length > 0) selectStep(0);

// --- Live mode ---
if (MODE === 'live') {
  // Show live indicator
  liveIndicator.innerHTML = '<span class="live-indicator"><span class="live-dot" id="live-dot"></span> LIVE</span>';

  // Hide codify bar in live mode (no trajectory path yet)
  codifyBar.style.display = 'none';

  function buildLiveHeaderHtml(data) {
    var html = '<div class="live-header">';
    html += '<div style="display:flex;align-items:center;gap:8px"><strong>' + escapeHtml(data.test_id) + '</strong>';
    html += '<span style="color:#484f58;font-size:12px">max ' + data.max_steps + ' steps</span></div>';
    html += '<div class="test-info"><h3 class="collapsible open" onclick="toggleCollapse(this)" style="font-size:12px;color:#8b949e;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0"><span class="arrow">&#9654;</span> Instruction</h3><div class="collapse-content" style="margin-top:8px">' + escapeHtml(data.instruction) + '</div></div>';
    if (data.completion_condition) {
      html += '<div class="test-info" style="margin-top:8px"><h3 class="collapsible open" onclick="toggleCollapse(this)" style="font-size:12px;color:#8b949e;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0"><span class="arrow">&#9654;</span> Completion Condition</h3><div class="collapse-content" style="margin-top:8px">' + escapeHtml(data.completion_condition) + '</div></div>';
    }
    if (data.vnc_url) {
      html += '<a class="vnc-link" href="' + escapeHtml(data.vnc_url) + '" target="_blank">VNC: ' + escapeHtml(data.vnc_url) + '</a>';
    }
    html += '</div>';
    return html;
  }

  // Fetch current state for late-connecting clients
  fetch('/state').then(function(r) { return r.json(); }).then(function(data) {
    if (data && data.type === 'test_start') {
      liveHeader.innerHTML = buildLiveHeaderHtml(data);
    }
  }).catch(function() {});

  // Connect to SSE
  var evtSource = new EventSource('/events');

  var MULTI_PHASE = false;
  var PHASE_DATA = {}; // phase_id → test_start data
  var CURRENT_PHASE_ID = null;

  function showPhaseTask(phaseId) {
    document.querySelectorAll('.step-item').forEach(function(el) { el.classList.remove('active'); });
    var recNav = document.getElementById('recording-nav');
    if (recNav) recNav.classList.remove('active');
    var taskNav = document.getElementById('task-nav');
    if (taskNav) taskNav.classList.remove('active');

    var data = PHASE_DATA[phaseId];
    if (!data) {
      mainPanel.innerHTML = '<div class="empty">Task data not yet available for this phase</div>';
      return;
    }
    var html = '<div class="detail-header"><h2>Task: ' + escapeHtml(data.test_id || 'Unknown') + '</h2></div>';
    html += '<div class="section"><h3 class="collapsible open" onclick="toggleCollapse(this)"><span class="arrow">&#9654;</span> Instruction</h3><div class="collapse-content"><div class="task-instruction">' + escapeHtml(data.instruction || '') + '</div></div></div>';
    if (data.completion_condition) {
      html += '<div class="section"><h3 class="collapsible open" onclick="toggleCollapse(this)"><span class="arrow">&#9654;</span> Completion Condition</h3><div class="collapse-content"><div class="task-instruction">' + escapeHtml(data.completion_condition) + '</div></div></div>';
    }
    html += '<div class="section"><h3>Details</h3><dl class="task-meta">';
    html += '<dt>Max Steps</dt><dd>' + (data.max_steps != null ? data.max_steps : 15) + '</dd>';
    if (data.vnc_url) {
      html += '<dt>VNC</dt><dd><a class="vnc-link" href="' + escapeHtml(data.vnc_url) + '" target="_blank">' + escapeHtml(data.vnc_url) + '</a></dd>';
    }
    html += '</dl></div>';
    mainPanel.innerHTML = html;
  }

  evtSource.addEventListener('phase_start', function(e) {
    var data = JSON.parse(e.data);
    MULTI_PHASE = true;
    CURRENT_PHASE_ID = data.phase_id;
    // Insert a phase divider in the step list (do NOT clear steps)
    var divider = document.createElement('div');
    divider.className = 'phase-divider';
    divider.id = 'phase-' + encodeURIComponent(data.phase_id);
    divider.innerHTML = '<span class="phase-label">' + escapeHtml(data.phase_name) + '</span>';
    divider.style.cssText = 'padding:8px 16px;background:#1c2128;border-bottom:1px solid #30363d;font-size:12px;font-weight:600;color:#d2a8ff;text-transform:uppercase;letter-spacing:0.5px;cursor:pointer;';
    (function(pid) {
      divider.addEventListener('click', function() { showPhaseTask(pid); });
    })(data.phase_id);
    stepList.appendChild(divider);
    // Remove "awaiting next phase" indicator if present
    var awaiting = document.getElementById('awaiting-phase');
    if (awaiting) awaiting.remove();
    // Remove old final-status bar for this transition
    var oldStatus = document.getElementById('final-status-bar');
    if (oldStatus) oldStatus.remove();
  });

  evtSource.addEventListener('test_start', function(e) {
    var data = JSON.parse(e.data);
    // Associate test_start data with the current phase
    if (CURRENT_PHASE_ID) {
      PHASE_DATA[CURRENT_PHASE_ID] = data;
    }
    if (!MULTI_PHASE) {
      // Single-phase mode: clear previous test's steps and final-status div
      STEPS = [];
      stepList.innerHTML = '';
      mainPanel.innerHTML = '<div class="empty">Waiting for first step...</div>';
      var oldStatus = document.getElementById('final-status-bar');
      if (oldStatus) oldStatus.remove();
    }
    liveHeader.innerHTML = buildLiveHeaderHtml(data);
  });

  evtSource.addEventListener('step_complete', function(e) {
    var data = JSON.parse(e.data);
    var step = {
      step: data.step,
      thought: data.thought,
      action_code: data.action_code,
      result: data.result,
      screenshot: data.screenshot_base64,
      timestamp: data.timestamp,
      bash_output: data.bash_output,
      error_feedback: data.error_feedback,
      action_type: data.action_type
    };
    var index = STEPS.length;
    STEPS.push(step);
    addStepToSidebar(step, index);
    // In multi-phase mode, release base64 screenshot data from older steps
    // to prevent browser memory exhaustion during long runs.
    // Keep the last 50 screenshots; older steps retain metadata but not image data.
    if (MULTI_PHASE && STEPS.length > 50) {
      var evictIdx = STEPS.length - 51;
      if (STEPS[evictIdx]) STEPS[evictIdx].screenshot = null;
    }
    // Auto-select the latest step
    selectStep(index);
    // Auto-scroll sidebar to bottom
    stepList.parentElement.scrollTop = stepList.parentElement.scrollHeight;
  });

  evtSource.addEventListener('test_complete', function(e) {
    var data = JSON.parse(e.data);
    // Remove any previous final-status div (suite mode)
    var old = document.getElementById('final-status-bar');
    if (old) old.remove();
    var statusDiv = document.createElement('div');
    statusDiv.id = 'final-status-bar';
    statusDiv.className = 'final-status';
    statusDiv.innerHTML = '<span class="badge ' + (data.passed ? 'pass' : 'fail') + '">' + (data.passed ? 'PASS' : 'FAIL') + '</span><div style="margin-top:8px;font-size:13px;color:#8b949e">' + escapeHtml(data.reasoning) + '</div><div style="margin-top:4px;font-size:12px;color:#484f58">' + (data.duration_ms > 0 ? (data.duration_ms / 1000).toFixed(1) + 's' : '') + '</div>';
    liveHeader.parentNode.insertBefore(statusDiv, stepList);

    if (MULTI_PHASE) {
      // Show "awaiting next phase" indicator in the step list
      var awaiting = document.createElement('div');
      awaiting.id = 'awaiting-phase';
      awaiting.style.cssText = 'padding:12px 16px;text-align:center;font-size:12px;color:#8b949e;font-style:italic;border-bottom:1px solid #21262d;';
      awaiting.innerHTML = '<span class="live-dot" style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#8b949e;animation:pulse 1.5s ease-in-out infinite;margin-right:6px;vertical-align:middle;"></span>Awaiting next phase...';
      stepList.appendChild(awaiting);
      stepList.parentElement.scrollTop = stepList.parentElement.scrollHeight;
      // Auto-hide after 60s if no new phase arrives
      setTimeout(function() {
        var el = document.getElementById('awaiting-phase');
        if (el) el.remove();
      }, 60000);
    }
  });

  evtSource.addEventListener('suite_progress', function(e) {
    var data = JSON.parse(e.data);
    var existing = document.getElementById('suite-progress');
    if (!existing) {
      existing = document.createElement('div');
      existing.id = 'suite-progress';
      existing.style.cssText = 'padding:8px 16px;border-bottom:1px solid #30363d;background:#161b22;';
      liveHeader.parentNode.insertBefore(existing, liveHeader);
    }
    existing.innerHTML = '<div style="font-size:12px;color:#8b949e">Suite: ' + data.completed + '/' + data.total + ' - ' + escapeHtml(data.current_test_id) + '</div><div class="progress-bar"><div class="fill" style="width:' + (data.total > 0 ? (data.completed / data.total * 100) : 0) + '%"></div></div>';
  });

  evtSource.onerror = function() {
    var dot = document.getElementById('live-dot');
    if (dot) { dot.classList.add('disconnected'); }
    var indicator = document.querySelector('.live-indicator');
    if (indicator) { indicator.style.color = '#f85149'; indicator.lastChild.textContent = ' DISCONNECTED'; }
  };
}
</script>
</body>
</html>
